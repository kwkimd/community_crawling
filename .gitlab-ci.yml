stages:
  - crawl

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: pip-cache
  paths:
    - .cache/pip/

naver-cafe-monitor:
  stage: crawl
  image: mcr.microsoft.com/playwright/python:v1.49.0-jammy
  before_script:
    - pip install -r requirements.txt -q
    - playwright install --with-deps chromium
    - python3 -c "import base64,os; open('naver_session.json','wb').write(base64.b64decode(os.environ['NAVER_SESSION_B64']))"
    - python3 -c "import base64,os; open('google_credentials.json','wb').write(base64.b64decode(os.environ['GOOGLE_CREDENTIALS_B64']))"
  script:
    - python naver_cafe_monitor.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"  # 수동 실행 허용
  timeout: 30 minutes
