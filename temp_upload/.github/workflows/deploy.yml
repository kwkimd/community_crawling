name: Deploy Dashboard to Render

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check syntax
      run: |
        python -m py_compile dashboard_server.py
        python -m py_compile database.py
        python -m py_compile gemini_analyzer.py
  
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to Render
      run: |
        echo "✅ 코드가 GitHub에 푸시되었습니다."
        echo "🚀 Render에서 자동으로 배포를 감지합니다."
        echo "📍 Render 대시보드를 확인하세요: https://dashboard.render.com"
